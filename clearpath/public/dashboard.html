<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClearPath — Staff Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 28px; background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    header h1 { font-size: 20px; font-weight: 700; color: #f8fafc; }
    header span { font-size: 13px; color: #94a3b8; margin-left: auto; }
    .dot { width: 8px; height: 8px; border-radius: 99px; background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px; padding: 28px;
    }

    .dept-col { background: #1e293b; border-radius: 14px; overflow: hidden; }
    .dept-header {
      padding: 14px 18px; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 1px solid #334155;
    }
    .dept-title { font-size: 15px; font-weight: 700; }
    .dept-count { font-size: 12px; color: #94a3b8; }
    .call-btn {
      padding: 6px 14px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: #3B8BD4; color: #fff; transition: background 0.15s;
    }
    .call-btn:hover { background: #2563eb; }
    .call-btn:disabled { background: #334155; color: #64748b; cursor: default; }

    .patient-list { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .patient-card {
      background: #0f172a; border-radius: 10px; padding: 12px 14px;
      border-left: 3px solid transparent; position: relative;
    }
    .patient-card.waiting  { border-left-color: #3B8BD4; }
    .patient-card.called   { border-left-color: #22c55e; background: #052e16; }

    .patient-name { font-size: 14px; font-weight: 600; color: #f1f5f9; }
    .patient-situation { font-size: 12px; color: #94a3b8; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .patient-meta { display: flex; gap: 8px; margin-top: 6px; align-items: center; }
    .urgency-pill {
      font-size: 11px; font-weight: 600; border-radius: 99px;
      padding: 2px 8px;
    }
    .high   { background: #7f1d1d; color: #fca5a5; }
    .medium { background: #713f12; color: #fcd34d; }
    .low    { background: #14532d; color: #86efac; }
    .wait-time { font-size: 11px; color: #64748b; margin-left: auto; }

    .actions { display: flex; gap: 6px; margin-top: 8px; }
    .action-btn {
      font-size: 11px; padding: 3px 8px; border-radius: 6px;
      border: 1px solid #334155; background: transparent;
      color: #94a3b8; cursor: pointer;
    }
    .action-btn:hover { background: #1e293b; color: #e2e8f0; }

    .empty { padding: 20px; text-align: center; color: #475569; font-size: 13px; }

    /* Move modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1e293b; border-radius: 16px; padding: 24px;
      width: 340px; border: 1px solid #334155;
    }
    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .modal select, .modal textarea {
      width: 100%; padding: 10px 12px; border-radius: 8px;
      border: 1px solid #334155; background: #0f172a;
      color: #e2e8f0; font-size: 14px; margin-bottom: 10px;
    }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .modal-btns button {
      padding: 8px 16px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-cancel { background: #334155; color: #94a3b8; }
    .btn-confirm { background: #3B8BD4; color: #fff; }

    /* Discharge modal */
    .discharge-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    .discharge-modal.open { display: flex; }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>＋ ClearPath — Staff Dashboard</h1>
  <span id="live-count">Connecting…</span>
</header>

<div class="grid" id="grid"></div>

<!-- Move modal -->
<div class="modal-overlay" id="move-modal">
  <div class="modal">
    <h3>Move patient to department</h3>
    <select id="move-dept">
      <option value="triage">General Triage — A1</option>
      <option value="rabies">Rabies Clinic — A3</option>
      <option value="emergency">Emergency Room — B1</option>
      <option value="pediatric">Pediatric ER — B4</option>
    </select>
    <textarea id="move-reason" rows="2" placeholder="Reason for transfer…"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeMove()">Cancel</button>
      <button class="btn-confirm" onclick="confirmMove()">Move patient</button>
    </div>
  </div>
</div>

<!-- Discharge modal -->
<div class="discharge-modal" id="discharge-modal">
  <div class="modal">
    <h3>Discharge patient</h3>
    <textarea id="discharge-instructions" rows="4" placeholder="Discharge instructions for the patient…"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeDischarge()">Cancel</button>
      <button class="btn-confirm" onclick="confirmDischarge()">Discharge</button>
    </div>
  </div>
</div>

<script>
const API = "http://localhost:3001";
const WS  = "ws://localhost:3001";

const DEPARTMENTS = {
  rabies:    { name: "Rabies Clinic",  room: "A3", floor: "1", color: "#0891b2", wait: 12 },
  emergency: { name: "Emergency Room", room: "B1", floor: "2", color: "#dc2626", wait: 38 },
  pediatric: { name: "Pediatric ER",   room: "B4", floor: "2", color: "#7c3aed", wait: 22 },
  triage:    { name: "General Triage", room: "A1", floor: "1", color: "#059669", wait: 8  },
};

let allPatients = [];
let movingPatientId = null;
let dischargingPatientId = null;

// ── WebSocket ──────────────────────────────────────────────────────────────
const ws = new WebSocket(WS);
ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);
  if (msg.queue) { allPatients = msg.queue; render(); }
};
ws.onopen = () => loadPatients();
ws.onerror = () => document.getElementById("live-count").textContent = "⚠ Disconnected";

async function loadPatients() {
  const res = await fetch(`${API}/api/patients`);
  allPatients = await res.json();
  render();
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById("grid");
  const total = allPatients.length;
  document.getElementById("live-count").textContent = `${total} patient${total !== 1 ? "s" : ""} in system`;

  grid.innerHTML = Object.entries(DEPARTMENTS).map(([id, dept]) => {
    const patients = allPatients.filter(p => p.department === id);
    const waiting  = patients.filter(p => p.status === "waiting");

    return `
      <div class="dept-col">
        <div class="dept-header">
          <div>
            <div class="dept-title" style="color:${dept.color}">${dept.name}</div>
            <div class="dept-count">${waiting.length} waiting · ~${dept.wait} min avg</div>
          </div>
          <button class="call-btn" onclick="callNext('${id}')" ${waiting.length === 0 ? "disabled" : ""}>
            Call next
          </button>
        </div>
        <div class="patient-list">
          ${patients.length === 0
            ? `<div class="empty">No patients</div>`
            : patients.map(p => patientCard(p, dept)).join("")
          }
        </div>
      </div>
    `;
  }).join("");
}

function patientCard(p, dept) {
  const checkedIn = new Date(p.checked_in_at + "Z");
  const mins = Math.round((Date.now() - checkedIn) / 60000);
  return `
    <div class="patient-card ${p.status}">
      <div class="patient-name">${p.name} ${p.language === "es" ? "🇪🇸" : ""}</div>
      <div class="patient-situation">${p.situation}</div>
      <div class="patient-meta">
        <span class="urgency-pill ${p.urgency}">${p.urgency}</span>
        <span class="wait-time">${p.status === "called" ? "✓ Called" : `${mins}m waiting`}</span>
      </div>
      ${p.reason ? `<div class="patient-situation" style="margin-top:4px;color:#64748b">${p.reason}</div>` : ""}
      <div class="actions">
        <button class="action-btn" onclick="openMove('${p.id}')">Move dept</button>
        <button class="action-btn" onclick="openDischarge('${p.id}')">Discharge</button>
      </div>
    </div>
  `;
}

// ── Actions ────────────────────────────────────────────────────────────────
async function callNext(dept) {
  await fetch(`${API}/api/call-next/${dept}`, { method: "POST" });
  loadPatients();
}

function openMove(id) {
  movingPatientId = id;
  document.getElementById("move-modal").classList.add("open");
}
function closeMove() {
  document.getElementById("move-modal").classList.remove("open");
  movingPatientId = null;
}
async function confirmMove() {
  const dept = document.getElementById("move-dept").value;
  const reason = document.getElementById("move-reason").value;
  const d = DEPARTMENTS[dept];
  await fetch(`${API}/api/move/${movingPatientId}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ department: dept, room: d.room, floor: d.floor, reason }),
  });
  closeMove();
  loadPatients();
}

function openDischarge(id) {
  dischargingPatientId = id;
  document.getElementById("discharge-modal").classList.add("open");
}
function closeDischarge() {
  document.getElementById("discharge-modal").classList.remove("open");
  dischargingPatientId = null;
}
async function confirmDischarge() {
  const instructions = document.getElementById("discharge-instructions").value;
  await fetch(`${API}/api/discharge/${dischargingPatientId}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ instructions }),
  });
  closeDischarge();
  loadPatients();
}
</script>
</body>
</html>
